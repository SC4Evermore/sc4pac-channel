info:
  summary: The Stearns Building, a SHUR Project release
  description: |-
    This is the seventh release in the Skipjack Historical Urban Restoration Project. Learn more about the history of this project here'Business was booming downtown in the 1920's and the need for office space was high. Built in 1929 by Harvey Strearns, this was one of many office structures to be constructed near the end of the decade. Harvey chose a fairly simple and straightforward style for his building and then used a reddish toned brick and concrete detailing to  set his office apart. Unlike many buildings in the Skipjack Historical Society's portfolio, this particular building never really suffered through a time of abandonment and decay. The offices have been leased since the building opened. The need to save this building came about when it stood in the way of "progress" downtown. The parking structure was eventually built on a nearby lot thanks in part to the efforts of the SHUR Project.

    The Stearns Building is based very loosely on a building in Fort Worth, Texas. This release contains three versions. There are growable R$$, CO$$ , and a CO$$ plop version. The ploppable version has all the same statistics as the growable with a plop cost of $5100. Enjoy!

