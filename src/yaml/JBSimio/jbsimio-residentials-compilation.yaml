group: "jbsimio"
name: shur-project-collection
version: "1.0.0"
subfolder: 200-residential
info:
  summary: Skipjack Historical Urban Restoration (SHUR) Project
  description: |
    By the time the industrial revolution came to America, Midland was poised to become one of the largest cities in the Midwest. The location of Midland made it a hub for railroads as well as shipbuilding and steel production. The population spiked and spurred a construction boom that has not been repeated in the city to this day. In a matter of three decades, the population exploded from 82,000 residents to 765,000. Land was in short supply and great pride was taken in the architecture of the day. The elite lived in sprawling estates outside the city, but many wealthy citizens took great pride in the urban apartments they called home and the ever taller commercial areas in which they conducted business. These were heady times in Midland, and the architecture not only reflected the optimism of endless prosperity, but also boasted the wealth and power of this great city and its people. Office buildings soared ever higher in the central city. Civic buildings were constructed with bragging rights in the foreground of every project. The apartments and hotels were places anyone would be proud to call home. Even the factories and warehouses lining the waterfront were built to impress.

    Unfortunately, the post war era signaled the beginning of the end for the mighty Midland. The automobile made the escape to suburbia possible. It was no longer considered fashionable to live in the grand apartment buildings of the city. Ever building racial tensions made matters worse for the inner city residents. Safety in the city became a real concern as more and more people fled for the outlying areas. City wide riots in the 1960s sealed the fate of Midland for years to come. The new reputation of the city was its own death bell. The once proud structures began to fall into disrepair. Many were lost to fire and more were simply lost to the elements. Urban renewal projects were limited to the downtown area and often did more harm than good to the historical buildings. Rather than invest in the older structures, city leaders opted to tear them down to make way for “bigger and better” buildings that would surely entice people to come back.

    Beginning in the late 1990s, the city began a slow comeback. Massive investments were made by private and public companies to revive the central areas of Midland. At about the same time, the attitude towards the larger historical structures changed. Many older buildings started to be restored and refurbished. Unfortunately, this only seemed to apply to the showcase buildings in the immediate downtown area. In response to this, a small grass roots organization was formed in a residential neighborhood surrounding Skipjack Park. The organization was founded to save the smaller historic buildings that the city overlooked. Originally, efforts centered around the Skipjack Park area and included little more than the large homes and one nearby apartment building. As time went on, The Skipjack Historical Urban Restoration (SHUR) Project grew and the list of buildings grew to monumental proportions. People following the news were stunned to learn of the number of historical treasures in the city. Young suburbanites began to move back into the city in search of an urban experience.
  author: JBSimio
  website: https://www.sc4evermore.com/index.php/downloads/download/11-residential/434-sc4d-lex-legacy-bsc-jbsimio-residentials-compilation
  images:
    - https://www.sc4evermore.com/images/sc4pac/jbsimio/SHURImage01.jpg
    - https://www.sc4evermore.com/images/sc4pac/jbsimio/Brownstone_Low.jpg
    - https://www.sc4evermore.com/images/sc4pac/jbsimio/Buder_Day.jpg
    - https://www.sc4evermore.com/images/sc4pac/jbsimio/Citizen_Day.jpg
