group: "jbsimio"
name: brownstones
version: "1.0.0"
subfolder: 200-residential
info:
  summary: The SHUR Brownstones, a SHUR Project release
  description: |-
    This is the eighth release in the Skipjack Historical Urban Restoration Project. Learn more about the history of this project [here](http://www.simtropolis.com/forum/messageview.cfm?catid=37&threadid=76703&STARTPAGE=14). There is entirely too much to talk about for this one to tell you a story about these buildings. Instead let's just get right into it, shall we?

    This set was inspired by a friend's apartment in Chicago's Lincoln Park Neighborhood. There are blocks upon blocks of three story brownstone apartments which initially look like carbon copies, but when seen in more detail each have minor variations and details which set it apart from the one next door. The goal was to make a set that would mimic this style to some extent. With that in mind, there are four main building models included here. Each has its own name: The Armitage, The Halstead, The Fullerton, and The Sheffield. Each of these four buildings then comes with three color variations along with other minor variations in trim or other details. This brings the total up to 12 different buildings. To make things a little more confusing, there are also two different wealth levels and three lot sizes. The buildings are arranged in families by model name. The color variations will grow at random.
    
    The low wealth lots are all 1x2 with a fairly grimy feel to the back alleys. The medium wealth lots will grow on either 1x2 with a narrow alley in the back or on 1x3 with off street parking in the back. The 1x3 lots utilize another set of custom prop families to cycle through several garages for increased variety. Some of these lots have carports or just uncovered parking. As if all that weren't enough, a couple of “bonus” double lots were added with their own little quirks depending on which wealth level you are using. This download will install all versions to your plugins folder. You may safely remove any lot files you do not wish to use, but the “Essentials” file should NOT be removed. 

    So all told, you're actually getting a total of 14 lots, using nearly 40 different models for buildings and props.

