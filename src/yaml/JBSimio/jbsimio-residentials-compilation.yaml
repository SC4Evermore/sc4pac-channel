group: "jbsimio"
name: bruder-building
version: "1.0.0"
subfolder: 200-residential
info:
  summary: The Buder Building, a SHUR Project release
  description: |-
    This is the twelveth release in the Skipjack Historical Urban Restoration Project. Learn more about the history of this project [here](http://www.simtropolis.com/forum/messageview.cfm?catid=37&threadid=76703&STARTPAGE=14)'.
    
    The Buder Building was designed in 1901 by William Albert Swasey whose work significantly influenced building design in St. Louis. The construction of the Buder Building, originally named the Missouri Pacific Building, was regarded as a pivotal event marking the completion of the 1890's development plan for the west side of Seventh Street and also heralding a new vision for the revitalization of Market Street and cost approximately $600,000 to construct. 
    
    This building was unfortunately torn down in 1984 along with several other buildings which occupied the same block. A number of personal liberties were taken with this version and while it is by no means an exact recreation, care was taken to keep the same spirit and borrowed as many of the character details as possible.

    This release contains three lot versions. A 3x3 stage seven growable with CO$$ jobs and also a functioning ploppable version with a plop cost of $8200 are included. All the other statistics are the same as the growable. There is also a 3x3 stage seven R$$ version as well. All three versions are designed to fit a wall to wall corner setting. As always, you can safely delete any LOT versions you don't need, just be sure to keep the MODEL file. Enjoy!

