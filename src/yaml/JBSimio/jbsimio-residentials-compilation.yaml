version: "1.0.0"
subfolder: 200-residential
info:
  summary: The Rookery Building, a SHUR Project release
  description: |-
    This is the fourteenth release in the Skipjack Historical Urban Restoration Project. Learn more about the history of this project [here](http://www.simtropolis.com/forum/messageview.cfm?catid=37&threadid=76703&STARTPAGE=14).

    This building was inspired by the "oldest surviving skyscraper" in Chicago, Illinois. Constructed from 1885-1888, the building features a powerful exterior softened by very ornate detailing. The real building blends strong masonry wall-bearing with early steel skeletal frame construction. It took the name "Rookery" from a temporary City Hall and water tank that sat on the building site. As a common roost for pigeons, the structures were referred to as "the rookery."  This is not meant to be an exact copy by any means and there are many differences, but the building's character has been preserved as much as possible.

    This release contains multiple lot versions. First is a 3x3 stage twelve growable with CS$ jobs which requires CAM to grow. There is also a functional plop version of this with a cost of $6700 to help fill that pesky CS$ demand. There are three versions with CO$$$ jobs: growable 3x3 stage seven, growable 4x4 stage six and also a functioning ploppable version with a plop cost of $6900. All the other statistics are the same as the growable. There are also two residential versions included. One is a 3x3 stage eight low wealth and the other is a 4x4 stage seven medium wealth'Every version is designed to fit in a more urban setting. As always, you can safely delete any LOT versions you don't need, just be sure to keep the MODEL file. Enjoy!

